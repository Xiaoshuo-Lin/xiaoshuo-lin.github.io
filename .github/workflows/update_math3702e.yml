name: Update MATH3702E.html

on:
  schedule:
    - cron: '40 6 * * 5'  # Runs every Thursday 16:00 UTC (Friday 00:00 Beijing Time)
  workflow_dispatch:  # Allows manual trigger

jobs:
  update-file:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Modify MATH3702E.html
        run: |
          sed -i 's|<!-- <a class="sol"|<a class="sol"|g' MATH3702E.html
          sed -i 's|</a> -->|</a>|g' MATH3702E.html

      - name: Commit and push changes
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add MATH3702E.html
          git commit -m "Auto-update MATH3702E.html (weekly update)" || exit 0
          git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/Xiaoshuo-Lin/xiaoshuo-lin.github.io.git main
